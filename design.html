<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Interior Design UI - Workspace</title>
  <link rel="stylesheet" href="style.css">
  <!-- Fabric.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>

  <nav class="navbar" style="position: absolute;">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Virtual Interior
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="design.html" class="active">Design</a></li>
    </ul>
    <div>
      <button id="saveLocalBtn" class="btn btn-outline" style="padding: 0.5rem 1rem; margin-right: 0.5rem;">Save State</button>
      <button id="downloadBtn" class="btn btn-primary" style="padding: 0.5rem 1rem;">Export PNG</button>
    </div>
  </nav>

  <div class="workspace-container">
    
    <!-- Left Sidebar: Furniture -->
    <aside class="panel left">
      <div class="panel-header">
        Furniture
      </div>
      <div class="panel-content">
        <div class="furniture-grid">
          
          <!-- Bed -->
          <div class="furniture-item" draggable="true" data-type="bed">
            <svg viewBox="0 0 24 24">
              <path d="M2 4v16M22 4v16M2 8h20M4 15h16M6 4v4M18 4v4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="4" y="8" width="16" height="7" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
            <span>Bed</span>
          </div>

          <!-- Sofa -->
          <div class="furniture-item" draggable="true" data-type="sofa">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="14" width="16" height="6" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M2 14v4a2 2 0 0 0 2 2h0M22 14v4a2 2 0 0 1-2 2h0M4 14V9a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v5" stroke="currentColor" stroke-width="2" fill="none"/>
              <line x1="8" y1="14" x2="8" y2="7" stroke="currentColor" stroke-width="2"/>
              <line x1="16" y1="14" x2="16" y2="7" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Sofa</span>
          </div>

          <!-- Table -->
          <div class="furniture-item" draggable="true" data-type="table">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="8" width="18" height="8" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
              <line x1="6" y1="16" x2="6" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="18" y1="16" x2="18" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="6" y1="8" x2="6" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="18" y1="8" x2="18" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Table</span>
          </div>

          <!-- Chair -->
          <div class="furniture-item" draggable="true" data-type="chair">
            <svg viewBox="0 0 24 24">
              <path d="M5 10h14v6H5z" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M7 10V4a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v6" stroke="currentColor" stroke-width="2" fill="none"/>
              <line x1="7" y1="16" x2="7" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="17" y1="16" x2="17" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Chair</span>
          </div>

          <!-- Wardrobe -->
          <div class="furniture-item" draggable="true" data-type="wardrobe">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="3" width="16" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
              <line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="2"/>
              <line x1="9" y1="12" x2="9" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="15" y1="12" x2="15" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Wardrobe</span>
          </div>

        </div>
      </div>
    </aside>

    <!-- Center Canvas Area -->
    <div class="canvas-wrapper">
      <div class="toolbar">
        <button id="clearBtn" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.875rem;">Clear Canvas</button>
        <div style="width: 1px; height: 24px; background: var(--border); margin: 0 0.5rem;"></div>
        
        <div class="toggle-container">
          <span style="font-size: 0.875rem; font-weight: 500;">Original</span>
          <label class="switch">
            <input type="checkbox" id="beforeAfterToggle" checked>
            <span class="slider"></span>
          </label>
          <span style="font-size: 0.875rem; font-weight: 500; color: var(--primary);">Designed</span>
        </div>
      </div>
      <div class="canvas-container-outer" id="canvasContainerOuter">
        <div id="dropzone" style="position: relative;">
          <!-- Canvas will be injected here by Fabric.js -->
          <canvas id="roomCanvas" width="600" height="500" class="canvas-shadow"></canvas>
        </div>
      </div>
    </div>

    <!-- Right Sidebar: Properties & Themes -->
    <aside class="panel right">
      <div class="panel-header">
        Properties
      </div>
      <div class="panel-content">
        
        <div id="noSelectionMsg" style="color: var(--text-muted); font-size: 0.875rem; text-align: center; margin-top: 2rem;">
          Select an object to edit its properties
        </div>

        <div id="propertiesPanel" style="display: none;">
          <div class="control-group">
            <label>Width (px)</label>
            <input type="number" id="propWidth" class="control-input">
          </div>
          <div class="control-group">
            <label>Height (px)</label>
            <input type="number" id="propHeight" class="control-input">
          </div>
          <div class="control-group">
            <label>Rotation (deg)</label>
            <input type="number" id="propRotation" class="control-input">
          </div>
          <div class="control-group">
            <label>Object Color</label>
            <input type="color" id="propColor" class="color-picker" value="#4F46E5">
          </div>
          <button id="deleteObjBtn" class="btn btn-outline" style="width: 100%; border-color: #ef4444; color: #ef4444;">Remove Object</button>
        </div>

        <div style="height: 1px; background: var(--border); margin: 2rem 0;"></div>

        <h4 style="margin-bottom: 1rem; font-size: 1rem;">Room Settings</h4>
        
        <div class="control-group">
          <label>Floor Color</label>
          <input type="color" id="floorColor" class="color-picker" value="#ffffff">
        </div>

        <div class="control-group">
          <label>Theme Presets</label>
          <div class="theme-options">
            <button class="theme-btn active" data-theme="modern">Modern</button>
            <button class="theme-btn" data-theme="minimal">Minimal</button>
            <button class="theme-btn" data-theme="classic">Classic</button>
          </div>
        </div>

      </div>
    </aside>

  </div>

  <script src="script.js"></script>
</body>
</html>
